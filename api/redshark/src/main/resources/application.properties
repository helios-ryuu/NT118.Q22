spring.application.name=redshark

# ===================== DATABASE =====================
# Local: PostgreSQL qua Docker Compose (mặc định)
# Để switch sang production (Supabase), comment block Local
# và uncomment block Production bên dưới

# --- Local (Docker) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/redshark-database?sslmode=disable
spring.datasource.username=redshark-user
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.security.user.password=disabled
# Tranh warning khi Hibernate thu drop unique constraint cu khong ton tai
spring.jpa.properties.hibernate.schema_update.unique_constraint_strategy=RECREATE_QUIETLY

# --- Production (Supabase) ---
# spring.datasource.url=jdbc:postgresql://<host>.supabase.co:5432/postgres
# spring.datasource.username=postgres
# spring.datasource.password=<supabase-db-password>

# ===================== ACTUATOR =====================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
