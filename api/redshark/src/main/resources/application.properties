spring.application.name=redshark

# ===================== DATABASE =====================
# Local: PostgreSQL qua Docker Compose (mặc định)
# Để switch sang production (Supabase), comment block Local
# và uncomment block Production bên dưới

# --- Local (Docker) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/redshark-database
spring.datasource.username=redshark-user
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# --- Production (Supabase) ---
# spring.datasource.url=jdbc:postgresql://<host>.supabase.co:5432/postgres
# spring.datasource.username=postgres
# spring.datasource.password=<supabase-db-password>

# ===================== ACTUATOR =====================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
